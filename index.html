<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="header">
    <h1 class="app-title">Budget Tracker</h1>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
      <span id="themeIcon">🌙</span>
    </button>
  </header>

  <main class="container">

    <!-- Total Balance -->
    <section class="balance-card" aria-label="Total balance">
      <p class="balance-label">Total Balance</p>
      <h2 class="balance-amount" id="totalBalance">Rp 0</h2>
      <div class="balance-stats">
        <div class="stat">
          <span class="stat-label">Food</span>
          <span class="stat-value" id="statFood">Rp 0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Transport</span>
          <span class="stat-value" id="statTransport">Rp 0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Fun</span>
          <span class="stat-value" id="statFun">Rp 0</span>
        </div>
        <div class="stat" id="customStatContainer" style="display:none;">
          <span class="stat-label">Others</span>
          <span class="stat-value" id="statCustom">Rp 0</span>
        </div>
      </div>
    </section>

    <!-- Spending Limit Alert -->
    <div class="limit-banner" id="limitBanner" style="display:none;" role="alert">
      You've exceeded your spending limit!
    </div>

    <!-- Monthly Summary Toggle -->
    <section class="monthly-summary" id="monthlySummary">
      <div class="section-header">
        <h3>Monthly Summary</h3>
        <button class="btn-ghost" id="toggleMonthly" aria-expanded="false">Show</button>
      </div>
      <div class="monthly-content hidden" id="monthlyContent">
        <div id="monthlyList"></div>
      </div>
    </section>

    <!-- Input Form -->
    <section class="form-card" aria-label="Add transaction">
      <h3 class="section-title">Add Transaction</h3>
      <form id="transactionForm" novalidate>
        <div class="form-group">
          <label for="itemName">Item Name</label>
          <input
            type="text"
            id="itemName"
            placeholder="e.g. Lunch, Bus fare…"
            autocomplete="off"
            required
          />
          <span class="error-msg" id="errorName"></span>
        </div>

        <div class="form-group">
          <label for="amount">Amount (Rp)</label>
          <input
            type="number"
            id="amount"
            placeholder="e.g. 15000"
            min="1"
            required
          />
          <span class="error-msg" id="errorAmount"></span>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="">-- Select Category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
            <option value="__custom__">Custom Category…</option>
          </select>
          <span class="error-msg" id="errorCategory"></span>
        </div>

        <!-- Custom category input (hidden by default) -->
        <div class="form-group hidden" id="customCategoryGroup">
          <label for="customCategory">Custom Category Name</label>
          <input
            type="text"
            id="customCategory"
            placeholder="e.g. Health, Shopping…"
          />
          <span class="error-msg" id="errorCustom"></span>
        </div>

        <!-- Spending limit -->
        <div class="form-group">
          <label for="spendingLimit">Spending Limit (Rp, optional)</label>
          <input
            type="number"
            id="spendingLimit"
            placeholder="Set a budget limit"
            min="1"
          />
        </div>

        <button type="submit" class="btn-primary">Add Transaction</button>
      </form>
    </section>

    <!-- Chart -->
    <section class="chart-card" aria-label="Spending chart">
      <div class="section-header">
        <h3 class="section-title">Spending by Category</h3>
      </div>
      <div class="chart-wrapper">
        <canvas id="spendingChart" aria-label="Pie chart of spending by category" role="img"></canvas>
        <p class="chart-empty" id="chartEmpty">No transactions yet</p>
      </div>
    </section>

    <!-- Transaction List -->
    <section class="list-card" aria-label="Transaction history">
      <div class="section-header">
        <h3 class="section-title">Transactions</h3>
        <div class="list-controls">
          <select id="sortSelect" aria-label="Sort transactions">
            <option value="date-desc">Latest First</option>
            <option value="date-asc">Oldest First</option>
            <option value="amount-desc">Highest Amount</option>
            <option value="amount-asc">Lowest Amount</option>
            <option value="category">By Category</option>
          </select>
        </div>
      </div>

      <ul class="transaction-list" id="transactionList" role="list">
        <!-- populated by JS -->
      </ul>
      <p class="list-empty" id="listEmpty">No transactions yet. Add one above!</p>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
